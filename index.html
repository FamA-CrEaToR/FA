<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: url("1.jpg")
        no-repeat center center;
            background-size: cover;
              }
            
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            text-align: center;
            width: 320px;
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #ff4d6d;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #e63950;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Ismingizni yozing 💖</h1>
    <input type="text" id="nameInput" placeholder="Ваше имя...">
    <button onclick="checkName()">Продолжить</button>
</div>

<script>
    function checkName() {
        const name = document.getElementById("nameInput").value.trim();

        if (!name) {
            alert("Пожалуйста, введите имя");
            return;
        }

        if (name.toLowerCase() === "севарахон") {
            // Переход на сайт 2
            window.location.href = "Письмо5.html";
        } else {
            // Переход на сайт 3 с передачей имени
            window.location.href = "Письмо3.html?name=" + encodeURIComponent(name);
        }
    }
</script>

</body>
</html>
